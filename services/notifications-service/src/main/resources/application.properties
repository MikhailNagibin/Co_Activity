spring.application.name=notifications-service
server.port=${NOTIFICATIONS_SERVICE_PORT:8082}
management.endpoints.web.exposure.include=health,info
management.health.mail.enabled=false

# Kafka consumer for email commands from core (host port from docker-compose.yml is 29092)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.missing-topics-fatal=false
notifications.kafka.topic=${NOTIFICATIONS_KAFKA_TOPIC:notifications.email.v1}
notifications.kafka.group-id=${NOTIFICATIONS_KAFKA_GROUP_ID:notifications-service-v1}

spring.mail.host=${SPRING_MAIL_HOST:smtp.yandex.ru}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
