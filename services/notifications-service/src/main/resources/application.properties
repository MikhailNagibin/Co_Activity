spring.application.name=notifications-service
server.port=${NOTIFICATIONS_SERVICE_PORT:8082}
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}
management.endpoint.health.probes.enabled=true
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:true}

# Kafka consumer for email commands from core
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.listener.missing-topics-fatal=${SPRING_KAFKA_LISTENER_MISSING_TOPICS_FATAL:true}
notifications.kafka.topic=${NOTIFICATIONS_KAFKA_TOPIC:notifications.email.v1}
notifications.kafka.dlt-topic=${NOTIFICATIONS_KAFKA_DLT_TOPIC:}
notifications.kafka.group-id=${NOTIFICATIONS_KAFKA_GROUP_ID:notifications-service-v1}
notifications.health.kafka-topics-timeout-ms=${NOTIFICATIONS_HEALTH_KAFKA_TOPICS_TIMEOUT_MS:5000}

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
notifications.mail.from=${NOTIFICATIONS_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
