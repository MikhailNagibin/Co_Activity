spring.application.name=core-service
management.endpoints.web.exposure.include=health,info

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5430/postgres_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT access token configuration (no refresh token in v1)
security.jwt.secret-base64=${JWT_SECRET_BASE64}
security.jwt.issuer=${JWT_ISSUER:coactivity-core}
security.jwt.audience=${JWT_AUDIENCE:coactivity-api}
security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:30}

# Internal HTTP integration with qa-service
qa.service.base-url=${QA_SERVICE_BASE_URL:http://qa-service:8081}

notifications.kafka.topic=${NOTIFICATIONS_KAFKA_TOPIC:notifications.email.v1}
notifications.kafka.send-timeout-ms=${NOTIFICATIONS_KAFKA_SEND_TIMEOUT_MS:5000}

# Kafka (core producer to notifications-service)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all

# Async email configuration
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=notification-
