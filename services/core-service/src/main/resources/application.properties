spring.application.name=core-service
management.endpoints.web.exposure.include=health,info

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5430/postgres_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.servlet.multipart.max-file-size=${SPRING_MULTIPART_MAX_FILE_SIZE:6MB}
spring.servlet.multipart.max-request-size=${SPRING_MULTIPART_MAX_REQUEST_SIZE:30MB}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

spring.session.store-type=redis
spring.session.timeout=${SPRING_SESSION_TIMEOUT:12h}
spring.session.redis.namespace=${SPRING_SESSION_REDIS_NAMESPACE:coactivity:sessions}
spring.session.redis.repository-type=indexed

server.servlet.session.cookie.name=${SESSION_COOKIE_NAME:COACTIVITY_SESSION}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=Lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

app.auth.challenge.ttl=${APP_AUTH_CHALLENGE_TTL:10m}
app.auth.challenge.max-attempts=${APP_AUTH_CHALLENGE_MAX_ATTEMPTS:5}
app.auth.challenge.resend-cooldown=${APP_AUTH_CHALLENGE_RESEND_COOLDOWN:60s}
app.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
app.storage.type=${APP_STORAGE_TYPE:s3}
app.storage.local.root=${APP_STORAGE_LOCAL_ROOT:./var/app-storage}
app.storage.s3.endpoint=${APP_STORAGE_S3_ENDPOINT:}
app.storage.s3.region=${APP_STORAGE_S3_REGION:us-east-1}
app.storage.s3.bucket=${APP_STORAGE_S3_BUCKET:}
app.storage.s3.access-key=${APP_STORAGE_S3_ACCESS_KEY:}
app.storage.s3.secret-key=${APP_STORAGE_S3_SECRET_KEY:}
app.storage.s3.path-style=${APP_STORAGE_S3_PATH_STYLE:true}
app.storage.s3.prefix=${APP_STORAGE_S3_PREFIX:}
app.storage.avatar.max-size-bytes=${APP_STORAGE_AVATAR_MAX_SIZE_BYTES:5242880}
app.storage.room-image.max-size-bytes=${APP_STORAGE_ROOM_IMAGE_MAX_SIZE_BYTES:5242880}

notifications.kafka.topic=${NOTIFICATIONS_KAFKA_TOPIC:notifications.email.v1}
notifications.kafka.send-timeout-ms=${NOTIFICATIONS_KAFKA_SEND_TIMEOUT_MS:5000}

# Kafka (core producer to notifications-service)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all

# Async email configuration
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=notification-
