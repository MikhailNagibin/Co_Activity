spring.application.name=notifications-service
server.port=${NOTIFICATIONS_SERVICE_PORT:8082}
management.endpoints.web.exposure.include=health,info

# Kafka consumer for email commands from core
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.missing-topics-fatal=false
notifications.kafka.topic=${NOTIFICATIONS_KAFKA_TOPIC:notifications.email.v1}
notifications.kafka.group-id=${NOTIFICATIONS_KAFKA_GROUP_ID:notifications-service-v1}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
