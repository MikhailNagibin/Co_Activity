<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoActivity - Активности</title>
    <link rel="stylesheet" th:href="@{/css/main-style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<header id="main-header">
    <h1>CoActivity</h1>
    <h4 class="gray-elem">
        <a th:href="@{/main}" style="color: rgb(0, 0, 0);">Активности</a>
    </h4>
    <h4 class="gray-elem">
        <a th:href="@{/qa-page}" style="color: rgb(116, 113, 113);">Вопросы-ответы</a>
    </h4>
    <i class="fa-regular fa-moon"></i>
    <div id="auth-buttons">
        <button id="login-btn"><a th:href="@{/sign-in}" style="color: white;">Войти</a></button>
    </div>
</header>

<section style="justify-items: center;">
    <h2 style="padding: 75px 0px 8px 46px;">Исследуйте активности</h2>
    <h3 style="padding-left: 46px;" class="gray-elem">Найдите партнеров по хобби, проектам, интересам</h3>
</section>

<main style="padding-left: 46px;">
    <div class="search-wrapper">
        <button class="search-button" id="search-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        <input id="search-input" placeholder="Поиск активностей..."
               style="width: 100%; height: 40px; border-radius: 7px; box-sizing: border-box; padding-left: 36px;"
               type="text">
    </div>

    <select id="category-select">
        <option value="">Все категории</option>
        <option value="SPORT">Спорт</option>
        <option value="MUSIC">Музыка</option>
        <option value="ART">Искусство</option>
        <option value="ENTERTAINMENT">Развлечения</option>
        <option value="BUSINESS">Бизнес</option>
        <option value="EDUCATION">Образование</option>
    </select>

    <button id="filter-btn">Фильтры</button>

    <section class="cards" id="rooms-container">
        <!-- Комнаты будут загружены сюда через JS -->
        <div class="loading">Загрузка...</div>
    </section>
</main>

<script th:src="@{/js/api.js}" type="module"></script>
<script th:src="@{/js/main.js}" type="module"></script>
</body>
</html>
