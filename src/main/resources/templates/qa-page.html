<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoActivity - Вопросы и ответы</title>
    <link rel="stylesheet" th:href="@{/css/qa-page-style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<header id="main-header">
    <h1>CoActivity</h1>
    <h4 class="gray-elem">
        <a th:href="@{/main}" style="color: rgb(116, 113, 113);">Активности</a>
    </h4>
    <h4 class="gray-elem">
        <a th:href="@{/qa-page}" style="color: rgb(0, 0, 0);">Вопросы-ответы</a>
    </h4>
    <i class="fa-regular fa-moon"></i>
    <div id="auth-buttons">
        <button><a th:href="@{/sign-in}" style="color: white;">Войти</a></button>
    </div>
</header>

<section style="justify-items: center;">
    <h2 style="padding: 75px 0px 8px 46px;">Форум для самых любознательных</h2>
    <h3 style="padding-left: 46px;" class="gray-elem">Задавайте вопросы и делитесь своими знаниями и опытом с сообществом</h3>
</section>

<main>
    <div class="search-wrapper">
        <button class="search-button" id="search-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        <input id="search-input" placeholder="Поиск вопросов..."
               style="width: 100%; height: 40px; border-radius: 7px; box-sizing: border-box; padding-left: 36px;"
               type="text">
    </div>

    <select id="category-select">
        <option value="">Все категории</option>
        <option value="SPORT">Спорт</option>
        <option value="MUSIC">Музыка</option>
        <option value="ART">Искусство</option>
        <option value="ENTERTAINMENT">Развлечения</option>
        <option value="BUSINESS">Бизнес</option>
        <option value="EDUCATION">Образование</option>
    </select>
    <button id="filter-btn">Фильтры</button>

    <div style="display: flex; width: 100%; margin-top:0px; margin-bottom: 25px;">
        <h2 style="margin-right: 20px;">Ключевые слова: </h2>
        <section class="tags" id="tags-container">
            <!-- Теги будут загружены динамически -->
        </section>
    </div>

    <section class="questions" id="questions-container">
        <div class="loading">Загрузка вопросов...</div>
    </section>
</main>

<script th:src="@{/js/api.js}" type="module"></script>
<script th:src="@{/js/qa.js}" type="module"></script>
</body>
</html>
