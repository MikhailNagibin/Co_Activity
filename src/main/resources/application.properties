spring.application.name=CoActivity Platform
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5430/postgres_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JWT access token configuration (no refresh token in v1)
security.jwt.secret-base64=${JWT_SECRET_BASE64:MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=}
security.jwt.issuer=${JWT_ISSUER:coactivity-core}
security.jwt.audience=${JWT_AUDIENCE:coactivity-api}
security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:30}

# QA routing mode
qa.mode=${QA_MODE:MONOLITH}
qa.service.base-url=${QA_SERVICE_BASE_URL:http://localhost:8081}

# Notifications routing mode
notifications.mode=${NOTIFICATIONS_MODE:INPROC}
notifications.service.base-url=${NOTIFICATIONS_SERVICE_BASE_URL:http://localhost:8082}
notifications.kafka.topic=${NOTIFICATIONS_KAFKA_TOPIC:notifications.email.v1}
notifications.kafka.send-timeout-ms=${NOTIFICATIONS_KAFKA_SEND_TIMEOUT_MS:5000}

# Kafka (core producer to notifications-service)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all

# Transactional outbox (v1)
outbox.enabled=${OUTBOX_ENABLED:false}
outbox.poll-delay-ms=${OUTBOX_POLL_DELAY_MS:3000}
outbox.batch-size=${OUTBOX_BATCH_SIZE:20}
outbox.max-retries=${OUTBOX_MAX_RETRIES:5}
outbox.retry-delay-seconds=${OUTBOX_RETRY_DELAY_SECONDS:30}

# Gmail SMTP Configuration
# Note: SPRING_MAIL_USERNAME and SPRING_MAIL_PASSWORD must be set as environment variables
# for security reasons. Never commit sensitive credentials to version control.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.protocol=smtp

# Additional properties for secure connection
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Async email configuration
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=notification-
