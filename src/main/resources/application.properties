# ===== APPLICATION =====
spring.application.name=CoActivity Platform

# ===== DATABASE =====
spring.datasource.url=${URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true


# ===== ASYNC EMAIL CONFIGURATION =====
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100

# ===== WEB & STATIC RESOURCES =====
server.port=8080
server.servlet.context-path=/
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true

# ===== JWT & SECURITY =====
jwt.secret=coactivity-secret-key-for-jwt-token-generation-2024
jwt.expiration=1800000
jwt.verification-code-expiration=600000

# ===== LOGGING - ???????? ??? ??????? =====
logging.level.root=WARN
logging.level.com.coactivity=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.orm=DEBUG
logging.level.org.springframework.transaction=DEBUG

# ===== FILE UPLOADS =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.enabled=true

debug=false
trace=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never


spring.mail.host=${SPRING_MAIL_HOST:smtp.yandex.ru}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000