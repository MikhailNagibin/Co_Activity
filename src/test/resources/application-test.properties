# Test configuration for email integration tests
# This file is used when running integration tests
spring.application.name=CoActivity Platform

# Disable JPA/Hibernate for email-only tests
spring.jpa.hibernate.ddl-auto=none

# Use in-memory database to avoid connection errors
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Yandex SMTP Configuration (same as main config)
spring.mail.host=smtp.yandex.com
spring.mail.port=587
spring.mail.username=bumagin.nicita@yandex.ru
spring.mail.password=lfegsmvshfxeithe
spring.mail.default-encoding=UTF-8

# Transport protocol
spring.mail.properties.mail.transport.protocol=smtp

# Additional properties for secure connection
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3
spring.mail.properties.mail.smtp.ssl.trust=smtp.yandex.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=true




