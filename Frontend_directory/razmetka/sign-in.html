<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoActivity</title>
    <link rel="stylesheet" href="../styles/sign-in-up-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header id="main-header">
        <h1>CoActivity</h1>
        <h4 class="gray-elem">
            <a style="color: rgb(116, 113, 113);" href="main.html">Активности</a>
        </h4>
        <h4 class="gray-elem">
            <a style="color: rgb(116, 113, 113);" href="qa-page.html">Вопросы-ответы</a>
        </h4>
        <i class="fa-regular fa-moon"></i>
        <button><a style="color: white;" href="sign-in.html">Войти</a></button>
    </header>
    
    <div class="virtual-elem"></div>

    <fieldset class="sign-field">
        <h2>Войти в CoActivity</h2>
        <h4 class="gray-elem">Введите свои данные для входа</h4>
        <br />
        <hr />
        <br />
        
        <section>
            <div>
                <h3>Почта</h3>
            <form action=""><input type="text" name="email" id="" placeholder="Введите почту"></form>
            </div>
            
            <div>
                <div style="display: flex; gap: 78%;">
                    <h3>Пароль</h3>
                    <em><a class="gray-elem" href="main.html">Забыли пароль?</a></em>
                </div>
            
                <form action=""><input type="text" name="password" id="" placeholder="Введите пароль"></form>
            </div>
            

            <button style="background-color: black; color: white; padding: 12px;" class="enter-button">Войти</button>
            
        </section>

        <hr />
        <br />

        <h3>У вас нет аккаунта? <a href="sign-up.html">Зарегистрироваться</a></h3>
        


    </fieldset>

</body>
</html>
