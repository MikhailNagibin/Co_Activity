<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoActivity</title>
    <link rel="stylesheet" href="../styles/sign-in-up-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header id="main-header">
        <h1>CoActivity</h1>
        <h4 class="gray-elem">
            <a style="color: rgb(116, 113, 113);" href="main.html">Активности</a>
        </h4>
        <h4 class="gray-elem">
            <a style="color: rgb(116, 113, 113);" href="qa-page.html">Вопросы-ответы</a>
        </h4>
        <i class="fa-regular fa-moon"></i>
        <button><a style="color: white;" href="sign-in.html">Войти</a></button>
    </header>
    <div class="virtual-elem"></div>

    <fieldset class="sign-field">
        <h2>Создать аккаунт в CoActivity</h2>
        <h4 class="gray-elem">Заполните поля для регистрации</h4>
        <br />
        <hr />
        <br />
        
        <section>
            <div>
                <h3>Почта</h3>
            <form action=""><input type="text" name="email" id="" placeholder="Введите почту"></form>
            </div>

            <div>
                <h3>Имя пользователя</h3>
            <form action=""><input type="text" name="nickname" id="" placeholder="Введите имя"></form>
            </div>
            
            <div>
                <h3>Пароль</h3>
                <form action=""><input type="text" name="password" id="" placeholder="Введите пароль"></form>
            </div>

            <div>
                <h3>Повтор пароля</h3>
                <form action=""><input type="text" name="password-again" id="" placeholder="Введите пароль еще раз"></form>
            </div>

            <div>
                <h3>Дата рождения</h3>
                <form action=""><input type="date" name="birth-date" id=""></form>
            </div>
            
            <div style="display: flex; justify-content: space-between;">

                <div>
                    <h3>Страна</h3>
                <form action=""><input type="text" name="country" id=""></form>
                </div>

                <div>
                    <h3>Город</h3>
                    <form action=""><input type="text" name="city" id=""></form>
                </div>

            </div>

            <div>
                <h3>О себе</h3>
                <textarea name="about" id="" rows="5" cols="100%"></textarea>
            </div>
            
            

            <button style="margin-top: 20px; background-color: black; color: white; padding: 12px;" class="enter-button">Создать аккаунт</button>
            
        </section>
        

    </fieldset>

</body>
</html>
