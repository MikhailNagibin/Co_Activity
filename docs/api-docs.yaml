openapi: 3.1.0
info:
  title: CoActivity API (core-service)
  version: 1.0.0
servers:
- url: http://localhost:8080
  description: Generated server url
tags:
- name: Auth
  description: "Аутентификация, регистрация, сессии и password reset."
- name: Q&A
  description: "Вопросы и ответы: публичное чтение и CRUD для авторизованных польз\
    ователей."
- name: Rooms
  description: "Комнаты: поиск/просмотр, участие, управление комнатой и governance\
    \ (участники/баны/ownership), изображения комнаты."
- name: Users
  description: "Профиль пользователя, аватар, настройки уведомлений, заявки на вст\
    упление, роли в комнатах, удаление аккаунта."
paths:
  /api/users/me:
    get:
      tags:
      - Users
      summary: Профиль текущего пользователя
      operationId: getUserProfile
      responses:
        "200":
          description: Профиль пользователя.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
      security:
      - sessionCookie: []
    put:
      tags:
      - Users
      summary: Обновить профиль текущего пользователя
      description: Обновляет поля профиля. Требуются session cookie и CSRF.
      operationId: updateUserProfile
      parameters:
      - name: X-XSRF-TOKEN
        in: header
        description: CSRF токен (дублирует cookie XSRF-TOKEN).
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdateRequest"
        required: true
      responses:
        "200":
          description: Обновлённый профиль.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "400":
          description: Ошибка валидации.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
      security:
      - sessionCookie: []
    delete:
      tags:
      - Users
      summary: Удалить аккаунт (если нет комнат-владений)
      description: "Удаляет аккаунт текущего пользователя, только если у него нет\
        \ комнат, где он OWNER. Требуются session cookie и CSRF. Выполняет logout\
        \ и инвалидирует сессии."
      operationId: deleteAccount
      parameters:
      - name: X-XSRF-TOKEN
        in: header
        description: CSRF токен (дублирует cookie XSRF-TOKEN).
        required: true
      responses:
        "204":
          description: Аккаунт удалён.
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "403":
          description: "Удаление запрещено (например, есть owned rooms)."
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "409":
          description: Конфликт состояния.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
      security:
      - sessionCookie: []
  /api/users/me/notifications:
    get:
      tags:
      - Users
      summary: Настройки уведомлений (текущий пользователь)
      operationId: getNotificationSettings
      responses:
        "200":
          description: Настройки уведомлений.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettingsResponse"
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
      security:
      - sessionCookie: []
    put:
      tags:
      - Users
      summary: Обновить настройки уведомлений
      description: Сохраняет настройки уведомлений для текущего пользователя. Требуются
        session cookie и CSRF.
      operationId: configureNotificationSettings
      parameters:
      - name: X-XSRF-TOKEN
        in: header
        description: CSRF токен (дублирует cookie XSRF-TOKEN).
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSettingsRequest"
        required: true
      responses:
        "200":
          description: Сохранённые настройки.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettingsResponse"
        "400":
          description: Ошибка валидации.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
      security:
      - sessionCookie: []
  /api/users/me/avatar:
    put:
      tags:
      - Users
      summary: Загрузить/заменить аватар
      description: Загружает изображение аватара. Требуются session cookie и CSRF.
      operationId: uploadAvatar
      parameters:
      - name: X-XSRF-TOKEN
        in: header
        description: CSRF токен (дублирует cookie XSRF-TOKEN).
        required: true
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Файл-изображение (jpeg/png/webp).
              required:
              - file
            encoding:
              file:
                contentType: '*/*'
      responses:
        "200":
          description: Профиль с обновлённым avatarUrl.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "400":
          description: Ошибка валидации/multipart/размер/тип файла.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "503":
          description: Хранилище недоступно.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
      security:
      - sessionCookie: []
    delete:
      tags:
      - Users
      summary: Удалить аватар
      description: Удаляет текущий аватар пользователя. Требуются session cookie и
        CSRF.
      operationId: deleteAvatar
      parameters:
      - name: X-XSRF-TOKEN
        in: header
        description: CSRF токен (дублирует cookie XSRF-TOKEN).
        required: true
      responses:
        "204":
          description: Аватар удалён.
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
      security:
      - sessionCookie: []
  /api/rooms/{roomId}:
    get:
      tags:
      - Rooms
      summary: Комната по ID
      description: "Публичный endpoint. Можно вызывать анонимно. Если передана сес\
        сия, ответ может содержать дополнительные поля/флаги."
      operationId: getRoomById
      parameters:
      - name: roomId
        in: path
        required: true
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
      responses:
        "200":
          description: Комната.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomDetailedResponse"
        "400":
          description: Некорректный roomId.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "404":
          description: Комната не найдена.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
    put:
      tags:
      - Rooms
      summary: Обновить комнату
      description: "Governance endpoint: обновляет параметры комнаты. Доступ: room\
        \ OWNER. Требуются session cookie и CSRF."
      operationId: updateRoom
      parameters:
      - name: roomId
        in: path
        description: ID комнаты.
        required: true
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
        example: 42
      - name: X-XSRF-TOKEN
        in: header
        description: CSRF токен (дублирует cookie XSRF-TOKEN).
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomUpdateRequest"
        required: true
      responses:
        "200":
          description: Обновлённая комната.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomDetailedResponse"
        "400":
          description: Ошибка валидации.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "403":
          description: Недостаточно прав (не OWNER).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "404":
          description: Комната не найдена.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
      security:
      - sessionCookie: []
    delete:
      tags:
      - Rooms
      summary: Удалить комнату
      description: "Governance endpoint: удаляет комнату. Доступ: room OWNER. Треб\
        уются session cookie и CSRF."
      operationId: deleteRoom
      parameters:
      - name: roomId
        in: path
        description: ID комнаты.
        required: true
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
        example: 42
      - name: X-XSRF-TOKEN
        in: header
        description: CSRF токен (дублирует cookie XSRF-TOKEN).
        required: true
      responses:
        "204":
          description: Комната удалена.
        "400":
          description: Некорректный roomId.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "403":
          description: Недостаточно прав (не OWNER).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "404":
          description: Комната не найдена.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
      security:
      - sessionCookie: []
  /api/rooms/{roomId}/bulletin:
    put:
      tags:
      - Rooms
      summary: Обновить bulletin board
      description: "Governance endpoint: обновляет содержимое bulletin board. Дост\
        уп: room OWNER/ADMIN. Требуются session cookie и CSRF. Рекомендуемый Content-Type:\
        \ text/plain."
      operationId: updateBulletinBoard
      parameters:
      - name: roomId
        in: path
        description: ID комнаты.
        required: true
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
        example: 42
      - name: X-XSRF-TOKEN
        in: header
        description: CSRF токен (дублирует cookie XSRF-TOKEN).
        required: true
      requestBody:
        content:
          text/plain:
            schema:
              type: string
        required: true
      responses:
        "200":
          description: Bulletin board обновлён.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulletinBoardResponse"
        "400":
          description: Ошибка валидации/пустой контент.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "403":
          description: Недостаточно прав (не OWNER/ADMIN).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "404":
          description: Комната не найдена.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
      security:
      - sessionCookie: []
    delete:
      tags:
      - Rooms
      summary: Удалить bulletin board
      description: "Governance endpoint: удаляет bulletin board. Доступ: room OWNER/ADMIN.\
        \ Требуются session cookie и CSRF."
      operationId: deleteBulletinBoard
      parameters:
      - name: roomId
        in: path
        description: ID комнаты.
        required: true
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
        example: 42
      - name: X-XSRF-TOKEN
        in: header
        description: CSRF токен (дублирует cookie XSRF-TOKEN).
        required: true
      responses:
        "204":
          description: Bulletin board удалён.
        "400":
          description: Некорректный roomId.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "403":
          description: Недостаточно прав (не OWNER/ADMIN).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "404":
          description: Комната/board не найдены.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
      security:
      - sessionCookie: []
  /api/qa/questions/{questionId}:
    get:
      tags:
      - Q&A
      summary: Вопрос с ответами
      description: Публичный endpoint.
      operationId: getQuestionWithAnswers
      parameters:
      - name: questionId
        in: path
        required: true
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
      responses:
        "200":
          description: Вопрос и ответы.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionWithAnswersResponse"
        "400":
          description: Некорректный questionId.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "404":
          description: Вопрос не найден.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
    put:
      tags:
      - Q&A
      summary: Обновить вопрос
      description: "Обновляет вопрос. Требуются session cookie и CSRF. Доступ: вла\
        делец вопроса."
      operationId: updateQuestion
      parameters:
      - name: X-XSRF-TOKEN
        in: header
        description: CSRF токен (дублирует cookie XSRF-TOKEN).
        required: true
      - name: questionId
        in: path
        required: true
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionRequest"
        required: true
      responses:
        "200":
          description: Обновлённый вопрос.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionResponse"
        "400":
          description: Ошибка валидации.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "403":
          description: Недостаточно прав (не владелец).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "404":
          description: Вопрос не найден.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
      security:
      - sessionCookie: []
    delete:
      tags:
      - Q&A
      summary: Удалить вопрос
      description: "Удаляет вопрос. Требуются session cookie и CSRF. Доступ: владе\
        лец вопроса."
      operationId: deleteQuestion
      parameters:
      - name: X-XSRF-TOKEN
        in: header
        description: CSRF токен (дублирует cookie XSRF-TOKEN).
        required: true
      - name: questionId
        in: path
        required: true
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
      responses:
        "204":
          description: Вопрос удалён.
        "400":
          description: Некорректный questionId.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "403":
          description: Недостаточно прав (не владелец).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "404":
          description: Вопрос не найден.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
      security:
      - sessionCookie: []
  /api/qa/answers/{answerId}:
    put:
      tags:
      - Q&A
      summary: Обновить ответ
      description: "Обновляет ответ. Требуются session cookie и CSRF. Доступ: влад\
        елец ответа."
      operationId: updateAnswer
      parameters:
      - name: X-XSRF-TOKEN
        in: header
        description: CSRF токен (дублирует cookie XSRF-TOKEN).
        required: true
      - name: answerId
        in: path
        required: true
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerUpdateRequest"
        required: true
      responses:
        "200":
          description: Обновлённый ответ.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerResponse"
        "400":
          description: Ошибка валидации.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "403":
          description: Недостаточно прав (не владелец).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "404":
          description: Ответ не найден.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "500":
          description: Неожиданная ошибка.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
      security:
      - sessionCookie: []
    delete:
      tags:
      - Q&A
      summary: Удалить ответ
      description: "Удаляет ответ. Требуются session cookie и CSRF. Доступ: владел\
        ец ответа."
      operationId: deleteAnswer
      parameters:
      - name: X-XSRF-TOKEN
        in: header
        description: CSRF токен (дублирует cookie XSRF-TOKEN).
        required: true
      - name: answerId
        in: path
        required: true
        schema:
          type: integer
          format: int32
          exclusiveMinimum: 0
      responses:
        "204":
          description: Ответ удалён.
        "400":
          description: Некорректный answerId.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "401":
          description: Требуется аутентификация.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
        "403":
          description: Недостаточно прав (не владелец).
          content:
            application/problem+json:
              schema:
