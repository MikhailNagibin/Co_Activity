components:
  schemas:
    UserProfileUpdateRequest:
      type: object
      properties:
        username:
          type: string
          maxLength: 20
          minLength: 2
        dateOfBirth:
          type: string
          format: date-time
        city:
          type: string
          maxLength: 100
          minLength: 0
        country:
          type: string
          maxLength: 100
          minLength: 0
        description:
          type: string
          maxLength: 500
          minLength: 0
        avatarId:
          type: integer
          format: int32
    UserProfileResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
        email:
          type: string
        username:
          type: string
        dateOfBirth:
          type: string
          format: date-time
        city:
          type: string
        country:
          type: string
        description:
          type: string
        avatarId:
          type: integer
          format: int32
        avatarUrl:
          type: string
        notifications:
          type: array
          items:
            type: string
            enum:
            - membershipAccepted
            - membershipRejected
            - activityClosed
            - newJoinRequest
            - importantRoomUpdates
    ApiFieldError:
      type: object
      description: Ошибка валидации/параметра запроса (одна строка).
      properties:
        field:
          type: string
        message:
          type: string
        code:
          type: string
    ApiProblemDetail:
      type: object
      description: "RFC 7807 Problem Details (`application/problem+json`) с расшир\
        ениями CoActivity: code, traceId, timestamp, errors."
      properties:
        type:
          type: string
          description: URI-тип ошибки.
          example: urn:coactivity:error:VALIDATION_FAILED
        title:
          type: string
          description: Короткий заголовок ошибки.
          example: Validation failed
        status:
          type: integer
          format: int32
          description: HTTP status code.
          example: 400
        detail:
          type: string
          description: Человекочитаемое описание причины.
          example: Validation failed
        instance:
          type: string
          description: URI конкретного запроса.
          example: /api/rooms/42
        timestamp:
          type: string
          format: date-time
          description: Время формирования ответа.
        code:
          type: string
          description: Код ошибки приложения.
          example: VALIDATION_FAILED
        traceId:
          type: string
          description: ID трассировки/запроса (также приходит в заголовке).
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        errors:
          type: array
          description: Детализация ошибок по полям (если применимо).
          items:
            $ref: "#/components/schemas/ApiFieldError"
    NotificationSettingsRequest:
      type: object
      properties:
        membershipAccepted:
          type: boolean
        membershipRejected:
          type: boolean
        activityClosed:
          type: boolean
        newJoinRequest:
          type: boolean
        importantRoomUpdates:
          type: boolean
    NotificationSettingsResponse:
      type: object
      properties:
        membershipAccepted:
          type: boolean
        membershipRejected:
          type: boolean
        activityClosed:
          type: boolean
        newJoinRequest:
          type: boolean
        importantRoomUpdates:
          type: boolean
        updatedAt:
          type: string
          format: date-time
    RoomUpdateRequest:
      type: object
      properties:
        isPublic:
          type: boolean
        category:
          type: string
        name:
          type: string
          maxLength: 100
          minLength: 3
        description:
          type: string
          maxLength: 2000
          minLength: 0
        city:
          type: string
          maxLength: 100
          minLength: 0
        country:
          type: string
          maxLength: 100
          minLength: 0
        maximumNumberOfPeople:
          type: integer
          format: int32
          maximum: 100000
          minimum: 2
        chatLink:
          type: string
          maxLength: 255
          minLength: 0
        dateOfStartEvent:
          type: string
          format: date-time
        dateOfEndEvent:
          type: string
          format: date-time
        frequency:
          type: string
          format: date-time
        status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - COMPLETED
        ageRating:
          type: integer
          format: int32
          maximum: 21
          minimum: 0
      required:
      - ageRating
      - category
      - description
      - isPublic
      - maximumNumberOfPeople
      - name
      - status
    BulletinBoardResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
        content:
          type: string
        author:
          $ref: "#/components/schemas/UserSummaryResponse"
        updatedAt:
          type: string
          format: date-time
    RoomDetailedResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
        status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - COMPLETED
        isPublic:
          type: boolean
        category:
          type: string
          enum:
          - SPORT
          - MUSIC
          - ART
          - ENTERTAINMENTS
          - BUSINESS
          - EDUCATION
          - ACTIVE_RECREATION
          - PASSIVE_RECREATION
          - IS_A_MASS_EVENT
          - OTHER
          - NOT_SPECIFIED
        name:
          type: string
        description:
          type: string
        city:
          type: string
        country:
          type: string
        dateOfStartEvent:
          type: string
          format: date-time
        dateOfEndEvent:
          type: string
          format: date-time
        ageRating:
          type: integer
          format: int32
        frequency:
          type: string
          format: date-time
        participantCount:
          type: integer
          format: int32
        maximumParticipants:
          type: integer
          format: int32
        creator:
          $ref: "#/components/schemas/UserSummaryResponse"
        isCurrentUserParticipant:
          type: boolean
        membershipStatus:
          $ref: "#/components/schemas/RoomMembershipStatusResponse"
        imageIds:
          type: array
          items:
            type: integer
            format: int32
        images:
          type: array
          items:
            $ref: "#/components/schemas/RoomImageResponse"
        hasProtectedAccess:
          type: boolean
        chatLink:
          type: string
        bulletinBoard:
          $ref: "#/components/schemas/BulletinBoardResponse"
        active:
          type: boolean
    RoomImageResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
        url:
          type: string
        order:
          type: integer
          format: int32
    RoomMembershipStatusResponse:
      type: object
      properties:
        roomId:
          type: integer
          format: int32
        userId:
          type: integer
          format: int32
        status:
          type: string
          enum:
          - PARTICIPANT
          - PENDING
          - BANNED
          - NOT_JOINED
        role:
          type: string
          enum:
          - Owner
          - Admin
          - Participant
        pendingRequestId:
          type: integer
          format: int32
        canJoin:
          type: boolean
    UserSummaryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
        userName:
          type: string
        dateOfBirth:
          type: string
          format: date-time
        city:
          type: string
        country:
          type: string
        description:
          type: string
        avatarId:
          type: integer
          format: int32
        avatarUrl:
          type: string
    QuestionRequest:
      type: object
      properties:
        category:
          type: string
        question:
